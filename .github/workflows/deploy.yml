name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mdBook
        run: cargo install --locked mdbook

      - name: Build mdBook
        run: cd docs && mdbook build

      - name: Organize output
        run: |
          mkdir _output
          cp website/index.html _output/
          cp website/styles.css _output/
          cp website/favicon.svg _output/
          cp -r docs/book _output/docs
          ls -la _output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: _output