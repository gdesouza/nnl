name: Build Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mdBook
        run: |
          cargo install --locked mdbook

      - name: Build mdBook
        run: |
          cd docs
          mdbook build

      - name: Copy website to root
        run: |
          cp -r website/. _site/
          cp -r docs/book/. _site/docs/
          cp website/favicon.svg _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site