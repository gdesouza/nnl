name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mdBook
        run: cargo install --locked mdbook

      - name: Build mdBook
        run: |
          cd docs
          mdbook build

      - name: Prepare website
        run: |
          mkdir _site
          cp website/index.html _site/
          cp website/styles.css _site/
          cp website/favicon.svg _site/
          cp -r docs/book/_site/docs
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site